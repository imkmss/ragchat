services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/app/models:ro
      - ./Modelfile:/app/Modelfile:ro
    entrypoint: >
      sh -c "ollama serve &
      until ollama list >/dev/null 2>&1; do sleep 1; done &&
      ollama pull qwen3-embedding:0.6b &&
      (ollama list | grep -q qwen3-8b-local || ollama create qwen3-8b-local -f Modelfile) &&
      wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q qwen3-8b-local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      ollama:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8312:80"
    depends_on:
      - backend

volumes:
  chroma_data:
  ollama_data:
